# App + Ollama. First run: docker compose exec ollama ollama pull qwen3.5:4b
services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      OPENAI_BASE_URL: http://ollama:11434/v1
      OPENAI_API_KEY: ollama
      MODEL_NAME: qwen3.5:4b
      HOST: 0.0.0.0
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-models:/root/.ollama
    # Uncomment for NVIDIA GPU acceleration:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  ollama-models:
